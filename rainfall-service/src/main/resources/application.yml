server:
  port: 8083

spring:
  application:
    name: rainfall-service
  datasource:
    url: jdbc:postgresql://localhost:5432/rainiq_rainfall
    username: postgres
    password: rainiq123

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    user:
      name: disable
      password: disable

jwt:
  secret: ${JWT_SECRET:thisIsAVeryLongSecretKeyForRainIQProjectThatIsAtLeast256BitsLong}
  expiration: ${JWT_EXPIRATION:86400000}

rainfall:
  stale:
    months: 6

geocoding:
  api:
    key: ${GEOCODING_API_KEY:}

openmeteo:
  base:
    url: https://historical-api.open-meteo.com